workflows:
  ionic-capacitor-android:
    name: Ionic Capacitor Android
    max_build_duration: 60

    environment:
      node: 22

    scripts:
      - node -v
      - npm install
      - npm run build
      - npx cap sync android

      - cd android
      - ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
